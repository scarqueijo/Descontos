  const CATS  = [{"id":"tech","label":"Tecnologia","emoji":"💻"},{"id":"gaming","label":"Gaming","emoji":"🎮"},{"id":"home","label":"Casa","emoji":"🏠"},{"id":"beauty","label":"Beleza","emoji":"💄"},{"id":"fashion","label":"Moda","emoji":"👕"},{"id":"baby","label":"Bebé & Criança","emoji":"🧸"},{"id":"tools","label":"Bricolage","emoji":"🔧"},{"id":"other","label":"Outras Ofertas","emoji":"🛍️"}];
  const STORE = {"amazon":"Amazon","worten":"Worten","aliexpress":"AliExpress","leroymerlin":"Leroy Merlin","pccomponentes":"PC Componentes"};
  let active = 'all';

  const grid = document.getElementById('grid');
  const catsEl = document.getElementById('cats');
  const countEl = document.getElementById('count');
  const emptyEl = document.getElementById('empty');

  function chip(id, label){ const b=document.createElement('button'); b.className='chip'+(id===active?' active':''); b.textContent=label; b.onclick=()=>{active=id;render();}; return b; }
  function buildChips(){
    catsEl.innerHTML='';
    catsEl.appendChild(chip('all','✨ Todas'));
    CATS.forEach(c=>catsEl.appendChild(chip(c.id, c.emoji+' '+c.label)));
  }
  function card(d){
    const old = d.original_price ? '<span class="old">'+fmt(d.original_price)+'</span> ' : '';
    const store = STORE[d.store] || (d.store? d.store : '');
    return '<div class="card"><div class="imgwrap">'
      + (store?'<span class="store">'+store+'</span>':'')
      + '<span class="disc">-'+d.discount+'%</span>'
      + '<img loading="lazy" src="'+d.image+'" alt=""></div>'
      + '<div class="body"><div class="title">'+escapeHtml(d.title)+'</div>'
      + '<div class="prices">'+old+'<span class="new">'+fmt(d.price)+'</span></div>'
      + '<a class="btn" href="'+d.url+'" target="_blank" rel="noopener sponsored">Ver oferta →</a></div></div>';
  }
  function render(){
    buildChips();
    const list = active==='all'? DEALS : DEALS.filter(d=>d.category===active);
    grid.innerHTML = list.map(card).join('');
    countEl.textContent = list.length+' ofertas';
    emptyEl.style.display = list.length? 'none':'block';
  }
  function fmt(v){return Number(v).toFixed(2).replace('.',',')+'€';}
  function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  render();
</script>
